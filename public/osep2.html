<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire - Gestion de Présence</title>
    <link rel="stylesheet" href="/public/styles1.css">
    <script src="/public/js/toast.js"></script>
    <style>

    </style>
</head>

<body>
    <header>
        <img src="/public/logo.jpg" alt="Logo de l'entreprise" id="logo">
        <h2 id="header" style="text-align: center;">GESTION DE PRÉSENCE</h2>
    </header>

    <main style="padding: 20px;">
        <form action="" method="POST">
            <label for="nom">Nom :</label>
            <input type="text" name="nom" placeholder="entrez votre nom" required>

            <label for="prenom">Prénom :</label>
            <input type="text" name="prenom" placeholder="entrez votre prénom" required>
            <label for="fonction">Fonction :</label>
            <input type="text" name="fonction" placeholder="entrez votre fonction (ex: Chef de service...)" required>
            <label for="emailFinal">Email :</label>
            <input type="email" id="emailFinal" name="email" readonly>
            <label for="structure">Structure :</label>
            <input type="text" name="structure" placeholder="entrez votre structure (ex: OSEP)" required>
            <label for="telephone">Téléphone :</label>
            <input type="tel" name="telephone" placeholder="entrez votre numéro de téléphone" required>
            <label for="dateAuto">Date de signature :</label>
            <input type="text" id="dateAuto" name="date" readonly placeholder="Date de signature">

            <br><br>
            <button type="submit" class="btn-vert">Suivant</button>
        </form>
    </main>


    <script>
        window.addEventListener('DOMContentLoaded', () => {

            const emailSauvegarde = localStorage.getItem('userEmail');

            if (emailSauvegarde) {
                document.getElementById('emailFinal').value = emailSauvegarde;
            } else {
                toast.error("Email manquant, redirection vers l'accueil...");
                setTimeout(() => {
                    const meetingUuid = window.location.pathname.split('/')[2];
                    window.location.href = `/meeting/${meetingUuid}`;
                }, 2000);
            }

            document.querySelector('form').addEventListener('submit', function (e) {
                e.preventDefault();

                // Sauvegarde des données dans localStorage
                const formData = new FormData(e.target);
                localStorage.setItem('userNom', formData.get('nom'));
                localStorage.setItem('userPrenom', formData.get('prenom'));
                localStorage.setItem('userFonction', formData.get('fonction'));
                localStorage.setItem('userStructure', formData.get('structure'));
                localStorage.setItem('userTelephone', formData.get('telephone'));

                // Capture du jeton t pour le passer à l'étape suivante (sign)
                const urlParams = new URLSearchParams(window.location.search);
                const t = urlParams.get('t') || '';

                // Navigate to signature page
                window.location.href = `sign?t=${t}`;
            });
        });
    </script>
</body>

</html>
