<!DOCTYPE html>
<html lang="fr" data-theme="green">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réunion Terminée - OSEP</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/styles.css">
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --bg-glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #f0fdf4;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            color: #111827;
            margin-bottom: 1rem;
        }

        p.desc {
            color: #4b5563;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .info-card {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            text-align: left;
            margin-bottom: 2.5rem;
            border: 1px solid #e5e7eb;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            color: #6b7280;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .value {
            color: #111827;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2);
        }

        .logo-footer {
            margin-top: 3rem;
            opacity: 0.5;
            font-weight: 700;
            letter-spacing: 1px;
            color: #374151;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon-box">
            <i class="fa-solid fa-calendar-check"></i>
        </div>
        <h1>Réunion Terminée</h1>
        <p class="desc">Cette séance est désormais close. Les enregistrements de présence ne sont plus acceptés pour
            cette réunion.</p>

        <div class="info-card">
            <div class="info-row">
                <span class="label">Réunion</span>
                <span class="value">
                    <%= meeting_title %>
                </span>
            </div>
            <div class="info-row">
                <span class="label">Date</span>
                <span class="value">
                    <%= date %>
                </span>
            </div>
            <div class="info-row">
                <span class="label">Début</span>
                <span class="value">
                    <%= start_time %>
                </span>
            </div>
            <div class="info-row">
                <span class="label">Fin effective</span>
                <span class="value">
                    <%= end_time %>
                </span>
            </div>
        </div>


        <div class="logo-footer">
            OSEP
        </div>
    </div>
</body>

</html>
