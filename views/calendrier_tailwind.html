<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier Admin | Tableau de bord - OSEP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* OSEP Light Theme Matching */
            --bg-main: #f0fdf4;
            /* Match body bg */
            --bg-glass: rgba(255, 255, 255, 0.9);
            --bg-card: rgba(255, 255, 255, 0.8);
            --fg-primary: #2d2d2d;
            /* Match text-main */
            --fg-secondary: #4b5563;
            --fg-muted: #797979;
            /* Match text-muted */
            --accent: #16a34a;
            /* OSEP Primary */
            --accent-hover: #15803d;
            /* OSEP Primary Dark */
            --accent-glow: rgba(22, 163, 74, 0.2);
            --border: #e6e6e6;
            /* Match border */
            --success: #32c832;
            /* OSEP Success */
            --warning: #fbbf24;
            --danger: #ef4444;
            --purple: #8b5cf6;
        }

        /* OSEP Orange Theme Overrides */
        html.theme-orange {
            --bg-main: #fffaf5;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --bg-card: rgba(255, 255, 255, 0.8);
            --accent: #FF7900;
            --accent-hover: #cc5d00;
            --accent-glow: rgba(255, 121, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-main);
            color: var(--fg-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Background Effects */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(167, 139, 250, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(52, 211, 153, 0.1) 0px, transparent 50%);
            pointer-events: none;
        }

        /* Layout */
        .app-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 1024px) {
            .app-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 100;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .menu-toggle {
                display: flex !important;
            }
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .brand-text h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand-text span {
            font-size: 0.75rem;
            color: var(--fg-muted);
            font-weight: 500;
        }

        /* Stats */
        .stat-card {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .stat-card h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--fg-muted);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--fg-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Filter List */
        .filter-group h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--fg-muted);
            margin-bottom: 1rem;
        }

        .user-filter {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .user-filter::-webkit-scrollbar {
            width: 4px;
        }

        .user-filter::-webkit-scrollbar-track {
            background: transparent;
        }

        .user-filter::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 3px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .user-item:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        .user-item.active {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #ffffff;
            /* keep text white on colored avatars */
            flex-shrink: 0;
        }

        .user-info {
            line-height: 1.3;
        }

        .user-info .name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-info .role {
            font-size: 0.75rem;
            color: var(--fg-muted);
        }

        /* Main Area */
        .main-content {
            padding: 2rem;
            overflow-y: auto;
        }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 101;
            width: 40px;
            height: 40px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 10px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .title-area h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .title-area p {
            color: var(--fg-secondary);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .date-nav {
            display: flex;
            align-items: center;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.25rem;
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--fg-secondary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--accent);
        }

        .current-display {
            font-weight: 600;
            padding: 0 0.75rem;
            min-width: 120px;
            text-align: center;
        }

        .btn-today {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--fg-primary);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-today:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Calendar Grid */
        .calendar-container {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .calendar-container::-webkit-scrollbar {
            height: 6px;
        }

        .calendar-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .calendar-header-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            min-width: 650px;
        }

        .day-name {
            text-align: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--fg-muted);
            font-weight: 600;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            min-width: 650px;
            animation: fadeInGrid 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInGrid {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .day-cell {
            min-height: 120px;
            padding: 0.75rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .day-cell:hover {
            background: var(--bg-card);
            border-color: var(--accent);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .day-cell.today {
            background: rgba(56, 189, 248, 0.05);
            border-color: var(--accent);
            box-shadow: inset 0 0 0 1px var(--accent-glow);
        }

        .day-cell.today::after {
            content: '';
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulseToday 2s infinite;
        }

        @keyframes pulseToday {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .day-cell.other-month {
            opacity: 0.3;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .day-num {
            font-size: 0.9rem;
            font-weight: 700;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--fg-secondary);
        }

        .day-cell.today .day-num {
            background: var(--accent);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px var(--accent-glow);
        }

        /* Events */
        .events-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 80px;
            overflow-y: auto;
        }

        .events-container::-webkit-scrollbar {
            display: none;
        }

        .event-tag {
            font-size: 0.75rem;
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid transparent;
        }

        .event-tag:hover {
            transform: translateX(4px);
            filter: brightness(1.1);
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.1);
        }

        .tag-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.7;
        }

        .tag-blue {
            background: rgba(56, 189, 248, 0.15);
            color: #7dd3fc;
            border-left: 2px solid #38bdf8;
        }

        .tag-green {
            background: rgba(52, 211, 153, 0.15);
            color: #6ee7b7;
            border-left: 2px solid #34d399;
        }

        .tag-red {
            background: rgba(248, 113, 113, 0.15);
            color: #fca5a5;
            border-left: 2px solid #f87171;
        }

        .tag-purple {
            background: rgba(167, 139, 250, 0.15);
            color: #c4b5fd;
            border-left: 2px solid #a78bfa;
        }

        /* Static FAB Button */
        .fab-create {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 18px;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px var(--accent-glow);
            z-index: 50;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fab-create:hover {
            transform: translateY(-4px) rotate(90deg);
            box-shadow: 0 15px 35px var(--accent-glow);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(240, 253, 244, 0.8);
            /* OSEP bg-body transparent */
            backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(20px);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .btn-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(0, 0, 0, 0.05);
            color: var(--fg-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: rgba(0, 0, 0, 0.1);
            color: var(--accent);
        }

        .modal-body {
            padding: 1.5rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--fg-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--fg-primary);
            font-family: inherit;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--fg-secondary);
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <!-- Background Mesh -->
    <div class="bg-mesh"></div>

    <!-- Layout -->
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="brand" onclick="window.location.href='/calendar'">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>Retour</h1>
                    <span>Calendrier Principal</span>
                </div>
            </div>

            <!-- Stats -->
            <div class="stat-card">
                <h4>Réunions aujourd'hui</h4>
                <div class="stat-value" id="statToday">0</div>
            </div>

            <!-- Filters -->
            <div class="filter-group">
                <h3>Participants</h3>
                <div class="user-filter" id="userFilterList">
                    <!-- Auto generated -->
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <button class="menu-toggle" id="menuToggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <header class="content-header">
                <div class="title-area">
                    <h2 id="mainTitle">Mois 2025</h2>
                    <p id="mainSubtitle">Vue administrateur globale</p>
                </div>
                <div class="controls">
                    <div class="date-nav">
                        <button class="nav-btn" id="prevBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg></button>
                        <span class="current-display" id="monthDisplay">Mois</span>
                        <button class="nav-btn" id="nextBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg></button>
                    </div>
                    <button class="btn-today" id="todayBtn">Aujourd'hui</button>
                </div>
            </header>

            <div class="calendar-container">
                <div class="calendar-header-grid">
                    <div class="day-name">Dim</div>
                    <div class="day-name">Lun</div>
                    <div class="day-name">Mar</div>
                    <div class="day-name">Mer</div>
                    <div class="day-name">Jeu</div>
                    <div class="day-name">Ven</div>
                    <div class="day-name">Sam</div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Auto generated -->
                </div>
            </div>
        </main>
    </div>

    <!-- Static FAB Button -->
    <button class="fab-create" id="fabCreate" title="Créer une réunion">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <!-- Modal Add -->
    <div class="modal-overlay" id="modalAdd">
        <div class="modal">
            <div class="modal-header">
                <h3>Nouvelle Réunion</h3>
                <button class="btn-close" id="closeAdd"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg></button>
            </div>
            <form id="formAdd">
                <div class="modal-body" style="max-height: 55vh; overflow-y: auto;">
                    <div class="input-group">
                        <label>Titre</label>
                        <input type="text" class="input-field" id="inputTitle" required
                            placeholder="Titre de la réunion">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label>Date</label>
                            <input type="date" class="input-field" id="inputDate" required>
                        </div>
                        <div class="input-group">
                            <label>Heure</label>
                            <input type="time" class="input-field" id="inputTime" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Lieu</label>
                        <input type="text" class="input-field" id="inputLocation" placeholder="Salle de conférence">
                    </div>
                    <div class="input-group">
                        <label>Type & Priorité</label>
                        <select class="input-field" id="inputType">
                            <option value="blue">Réunion Interne (Bleu)</option>
                            <option value="green">Formation (Vert)</option>
                            <option value="red">Urgent (Rouge)</option>
                            <option value="purple">Partenaire Externe (Violet)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Organisateur</label>
                        <select class="input-field" id="inputCreator"></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-ghost" id="cancelAdd">Annuler</button>
                    <button type="submit" class="btn-primary" id="btnSubmitAdd">Créer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Details -->
    <div class="modal-overlay" id="modalDetail">
        <div class="modal">
            <div class="modal-header">
                <h3>Détails</h3>
                <button class="btn-close" id="closeDetail"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg></button>
            </div>
            <div class="modal-body" id="detailBody"></div>
            <div class="modal-footer">
                <button class="btn-ghost" onclick="window.location.href='/links'"
                    style="margin-right:auto; border-color:var(--accent); color:var(--accent)">Accéder Réunion</button>
                <button class="btn-ghost" id="deleteBtn"
                    style="border-color:var(--danger); color:var(--danger)">Supprimer</button>
            </div>
        </div>
    </div>

    <script src="/public/js/toast.js"></script>

    <script>
        // Variables
        let users = [];
        let meetings = [];
        let currentDate = new Date();
        let currentFilter = "all";
        let selectedMeeting = null;

        // DOM
        const calendarGrid = document.getElementById('calendarGrid');
        const monthDisplay = document.getElementById('monthDisplay');
        const mainTitle = document.getElementById('mainTitle');
        const mainSubtitle = document.getElementById('mainSubtitle');
        const userFilterList = document.getElementById('userFilterList');
        const statToday = document.getElementById('statToday');

        // Init
        async function init() {
            setupListeners();

            try {
                const [usersRes, meetingsRes] = await Promise.all([
                    fetch('/api/users'),
                    fetch('/api/admin/calendar-events')
                ]);

                if (usersRes.ok && meetingsRes.ok) {
                    users = await usersRes.json();
                    meetings = await meetingsRes.json();

                    // Build User profile data
                    users.forEach((u, i) => {
                        const colors = ['#38bdf8', '#34d399', '#f87171', '#a78bfa', '#fbbf24'];
                        u.color = u.theme_color || colors[i % colors.length];
                        const names = (u.full_name || u.username).split(' ');
                        u.initials = names.length > 1 ? (names[0][0] + names[1][0]).toUpperCase() : names[0].substring(0, 2).toUpperCase();
                    });
                }
            } catch (error) {
                console.error("Init Error:", error);
            }

            setupFilters();
            setupCreatorSelect();
            updateStats();
            renderCalendar();
        }

        function setupFilters() {
            // All
            const allItem = document.createElement('div');
            allItem.className = 'user-item active';
            allItem.dataset.id = 'all';
            allItem.innerHTML = `
        <div class="avatar" style="background: linear-gradient(135deg, #94a3b8, #475569)">Tous</div>
        <div class="user-info"><div class="name">Tous les utilisateurs</div></div>
      `;
            userFilterList.appendChild(allItem);

            users.forEach(u => {
                const item = document.createElement('div');
                item.className = 'user-item';
                item.dataset.id = u.id;
                item.innerHTML = `
          <div class="avatar" style="background: ${u.color}">${u.initials}</div>
          <div class="user-info">
            <div class="name">${u.full_name || u.username}</div>
            <div class="role">${u.role}</div>
          </div>
        `;
                userFilterList.appendChild(item);
            });
        }

        function setupCreatorSelect() {
            const select = document.getElementById('inputCreator');
            users.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = `${u.full_name || u.username} - ${u.role}`;
                select.appendChild(opt);
            });
        }

        function updateStats() {
            const nowLocal = new Date();
            const todayStr = new Date(nowLocal.getTime() - (nowLocal.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const count = meetings.filter(m => new Date(m.start).toISOString().split('T')[0] === todayStr).length;
            statToday.textContent = count;
        }

        function getBackendTypeColorClass(type, priority) {
            if (priority === 'high') return 'red';
            if (priority === 'low') return 'green';
            if (type === 'inter' || type === 'partenaire_externe') return 'purple';
            return 'blue';
        }

        // Render Calendar
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

            mainTitle.textContent = monthNames[month] + " " + year;
            monthDisplay.textContent = monthNames[month].substring(0, 3) + " " + year;

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay();
            const totalDays = lastDay.getDate();

            calendarGrid.innerHTML = '';

            // Prev month padding
            const prevLastDay = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i >= 0; i--) {
                const cell = createDayCell(prevLastDay - i, true);
                calendarGrid.appendChild(cell);
            }

            // Current month
            const nowLocal = new Date();
            const localTodayStr = new Date(nowLocal.getTime() - (nowLocal.getTimezoneOffset() * 60000)).toISOString().split('T')[0];

            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === localTodayStr;
                const cell = createDayCell(day, false, isToday, dateStr);
                calendarGrid.appendChild(cell);
            }

            // Next month padding
            const remaining = 42 - calendarGrid.children.length;
            for (let i = 1; i <= remaining; i++) {
                const cell = createDayCell(i, true);
                calendarGrid.appendChild(cell);
            }
        }

        function createDayCell(dayNum, isOther, isToday = false, dateStr = null) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (isOther) cell.classList.add('other-month');
            if (isToday) cell.classList.add('today');

            const header = document.createElement('div');
            header.className = 'day-header';
            header.innerHTML = `<span class="day-num">${dayNum}</span>`;
            cell.appendChild(header);

            if (!isOther && dateStr) {
                cell.onclick = (e) => {
                    // Prevent opening Add if clicked on an event tag
                    if (e.target.closest('.event-tag')) return;
                    openAdd(dateStr);
                };

                const eventsContainer = document.createElement('div');
                eventsContainer.className = 'events-container';

                let dayMeetings = meetings.filter(m => new Date(m.start).toISOString().split('T')[0] === dateStr);
                if (currentFilter !== 'all') {
                    dayMeetings = dayMeetings.filter(m => String(m.organizer.id) === currentFilter);
                }

                dayMeetings.forEach(meet => {
                    const tag = document.createElement('div');
                    const colorLabel = getBackendTypeColorClass(meet.type, meet.priority);
                    tag.className = `event-tag tag-${colorLabel}`;

                    const timeStr = new Date(meet.start).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                    tag.innerHTML = `<span class="tag-dot"></span> <b>${timeStr}</b> ${meet.title}`;

                    tag.onclick = (e) => {
                        e.stopPropagation();
                        openDetail(meet);
                    };
                    eventsContainer.appendChild(tag);
                });

                cell.appendChild(eventsContainer);
            }

            return cell;
        }

        // Modals
        function openDetail(meeting) {
            selectedMeeting = meeting;

            const user = users.find(u => u.id === meeting.organizer.id) || meeting.organizer;
            const colorLabel = getBackendTypeColorClass(meeting.type, meeting.priority);
            const dateStr = new Date(meeting.start).toLocaleDateString('fr-FR');
            const timeStr = new Date(meeting.start).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

            const body = document.getElementById('detailBody');
            body.innerHTML = `
        <div style="margin-bottom: 1rem;">
          <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;">${meeting.title}</h2>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            <span class="event-tag tag-${colorLabel}" style="width: fit-content;">${meeting.type.toUpperCase() || 'INTRA'}</span>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
          <div style="background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 12px; border: 1px solid var(--border);">
            <div style="font-size: 0.7rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">Date</div>
            <div style="font-weight: 600;">${dateStr}</div>
          </div>
          <div style="background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 12px; border: 1px solid var(--border);">
            <div style="font-size: 0.7rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">Heure</div>
            <div style="font-weight: 600;">${timeStr}</div>
          </div>
        </div>
        <div style="background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 12px; border: 1px solid var(--border);">
          <div style="font-size: 0.7rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">Organisateur</div>
          <div style="display: flex; align-items: center; gap: 0.75rem;">
            <div class="avatar" style="background: ${user.color || '#38bdf8'}">${user.initials || '??'}</div>
            <div>
              <div style="font-weight: 600;">${user.full_name || user.username || user.name}</div>
              <div style="font-size: 0.8rem; color: var(--fg-muted);">${user.role || ''}</div>
            </div>
          </div>
        </div>
      `;

            document.getElementById('modalDetail').classList.add('show');
        }

        function closeDetail() {
            document.getElementById('modalDetail').classList.remove('show');
            selectedMeeting = null;
        }

        function openAdd(preDate = null) {
            const today = new Date();
            const localDate = preDate || new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            document.getElementById('inputDate').value = localDate;
            document.getElementById('modalAdd').classList.add('show');

            // Quick scale effect on the cell if clicked
            if(preDate) {
                const targetCell = Array.from(document.querySelectorAll('.day-cell')).find(c => c.onclick && c.toString().includes(preDate));
                // Optionnel: highlight visual feedback
            }

            // Auto select myself if possible
            try {
                const sessionUser = JSON.parse(sessionStorage.getItem('osep_user_profile'));
                if (sessionUser) document.getElementById('inputCreator').value = sessionUser.id;
            } catch (e) { }
        }

        function closeAdd() {
            document.getElementById('modalAdd').classList.remove('show');
        }

        // Listeners
        function setupListeners() {
            // Nav
            document.getElementById('prevBtn').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
            document.getElementById('nextBtn').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };
            document.getElementById('todayBtn').onclick = () => { currentDate = new Date(); renderCalendar(); };

            // Filters
            userFilterList.onclick = (e) => {
                const item = e.target.closest('.user-item');
                if (item) {
                    document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentFilter = item.dataset.id;

                    if (currentFilter === 'all') {
                        mainSubtitle.textContent = "Vue administrateur globale";
                    } else {
                        const u = users.find(u => String(u.id) === currentFilter);
                        if (u) mainSubtitle.textContent = `Filtré: ${u.full_name || u.username}`;
                    }
                    renderCalendar();
                }
            };

            // FAB ouve la modale interne au lieu de rediriger
            document.getElementById('fabCreate').onclick = () => {
                openAdd();
            };

            // Modals
            document.getElementById('closeAdd').onclick = closeAdd;
            document.getElementById('cancelAdd').onclick = closeAdd;
            document.getElementById('closeDetail').onclick = closeDetail;

            document.getElementById('deleteBtn').onclick = async () => {
                if (selectedMeeting) {
                    if (!confirm(`Êtes-vous sûr de vouloir supprimer la réunion : ${selectedMeeting.title} ?`)) return;

                    try {
                        const res = await fetch('/api/meetings/' + selectedMeeting.id, { method: 'DELETE' });
                        if (res.ok) {
                            showToast("Réunion supprimée", "success");
                            meetings = meetings.filter(m => m.id !== selectedMeeting.id);
                            closeDetail();
                            updateStats();
                            renderCalendar();
                        } else {
                            showToast("Erreur lors de la suppression", "error");
                        }
                    } catch (e) {
                        showToast("Erreur réseau", "error");
                    }
                }
            };

            // Form Submit
            document.getElementById('formAdd').onsubmit = async (e) => {
                e.preventDefault();
                document.getElementById('btnSubmitAdd').innerHTML = 'Patientez...';

                const title = document.getElementById('inputTitle').value;
                const dDate = document.getElementById('inputDate').value;
                const dTime = document.getElementById('inputTime').value;
                const location = document.getElementById('inputLocation').value;
                const typeColor = document.getElementById('inputType').value; // blue, green, red, purple
                const creatorId = document.getElementById('inputCreator').value;

                const startDateTime = new Date(`${dDate}T${dTime}:00`);
                const endDateTime = new Date(startDateTime.getTime() + 60 * 60 * 1000); // 1 hr default

                let mType = 'intra'; let mPrio = 'medium'; let mColor = '#38bdf8';
                if (typeColor === 'green') { mPrio = 'low'; mColor = '#34d399'; }
                else if (typeColor === 'red') { mPrio = 'high'; mColor = '#f87171'; }
                else if (typeColor === 'purple') { mType = 'partenaire_externe'; mColor = '#a78bfa'; }

                const payload = {
                    title,
                    start_time: startDateTime.toISOString(),
                    end_time: endDateTime.toISOString(),
                    location: location || null,
                    meeting_type: mType,
                    priority: mPrio,
                    theme_color: mColor,
                    user_id: creatorId ? parseInt(creatorId) : null
                };

                try {
                    const res = await fetch('/api/meetings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        showToast("Nouvelle réunion créée !", "success");
                        // Refresh meetings
                        const mRes = await fetch('/api/admin/calendar-events');
                        meetings = await mRes.json();
                        closeAdd();
                        updateStats();
                        renderCalendar();
                    } else {
                        const err = await res.json();
                        showToast(err.error || "Erreur lors de la création", "error");
                    }
                } catch (err) {
                    showToast("Erreur Serveur", "error");
                } finally {
                    document.getElementById('btnSubmitAdd').innerHTML = 'Créer';
                }
            };

            // Mobile
            document.getElementById('menuToggle').onclick = () => {
                document.getElementById('sidebar').classList.toggle('open');
            };
        }

        // Apply theme from localStorage on load
        function applyOSEPTheme() {
            try {
                const savedTheme = localStorage.getItem('osep-theme');
                if (savedTheme === 'orange') {
                    document.documentElement.classList.add('theme-orange');
                } else {
                    document.documentElement.classList.remove('theme-orange');
                }
            } catch (e) {
                console.error("Theme Error:", e);
            }
        }

        // Initialize theme check before everything else
        applyOSEPTheme();

        init();
    </script>
</body>

</html>
