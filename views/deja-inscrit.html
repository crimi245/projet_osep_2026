<!DOCTYPE html>
<html lang="fr" data-theme="green">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Déjà Effectuée</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Variables du thème clair (par défaut) */
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --fg: #0f172a;
            --fg-secondary: #475569;
            --border: #e2e8f0;
            --accent: #059669;
            --accent-light: #ecfdf5;
            --accent-dark: #047857;
            --success: #10b981;
            --muted: #64748b;
        }

        [data-theme="orange"] {
            --accent: #ea580c;
            --accent-light: #ffedd5;
            --accent-dark: #c2410c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1,
        h2 {
            font-family: 'Outfit', sans-serif;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 2rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.6s ease forwards;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--accent);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: var(--accent-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            color: var(--accent);
            font-size: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            color: var(--fg);
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1rem;
            color: var(--fg-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .participant-name {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #f1f5f9;
            border-radius: 8px;
            font-weight: 600;
            color: var(--fg);
            margin-bottom: 1.5rem;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn-close {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--fg-secondary);
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-close:hover {
            background: var(--border);
            color: var(--fg);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon-container">
            <i class="fa-solid fa-user-check"></i>
        </div>

        <h1>Déjà Enregistré(e)</h1>

        <div class="participant-name" id="nameDisplay">
            Participant
        </div>

        <p>
            Il semblerait que vous ayez déjà validé votre présence pour cette réunion.
            Votre inscription a bien été prise en compte.
        </p>

        <p style="font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem;">
            Il n'est pas nécessaire de vous inscrire une seconde fois.
        </p>

        <button class="btn-close" onclick="window.close();">
            <i class="fa-solid fa-xmark"></i> Fermer l'onglet
        </button>
    </div>

    <script>
        // Récupérer le nom depuis les paramètres d'URL
        const urlParams = new URLSearchParams(window.location.search);
        const nom = urlParams.get('nom');
        const prenom = urlParams.get('prenom');

        if (nom && prenom) {
            document.getElementById('nameDisplay').textContent = `${prenom} ${nom}`.toUpperCase();
        } else if (nom) {
            document.getElementById('nameDisplay').textContent = nom.toUpperCase();
        }
    </script>
</body>

</html>
